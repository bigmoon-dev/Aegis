<svg xmlns="http://www.w3.org/2000/svg" width="820" height="580" viewBox="0 0 820 580">
  <!-- Window frame -->
  <rect fill="#1e1e2e" width="820" height="580" rx="10" ry="10"/>
  <rect fill="#181825" width="820" height="36" rx="10" ry="10"/>
  <rect fill="#181825" width="820" height="16" y="20"/>

  <!-- Traffic lights -->
  <circle fill="#f38ba8" cx="20" cy="18" r="6"/>
  <circle fill="#f9e2af" cx="40" cy="18" r="6"/>
  <circle fill="#a6e3a1" cx="60" cy="18" r="6"/>
  <text fill="#9399b2" x="370" y="22" text-anchor="middle" font-family="Menlo,Consolas,monospace" font-size="12">aegis demo — bash</text>

  <g transform="translate(20, 50)" font-family="Menlo,Consolas,monospace" font-size="13">
    <!-- Start -->
    <text fill="#6c7086" y="0">$</text>
    <text fill="#cdd6f4" x="16" y="0">npx aegis-mcp-proxy demo</text>
    <text fill="#a6e3a1" y="20">✓ Demo server running on :18070</text>

    <!-- tools/list -->
    <text fill="#89dceb" font-weight="bold" y="52">▶ List tools (ACL filtering)</text>
    <text fill="#6c7086" y="72">$</text>
    <text fill="#cdd6f4" x="16" y="72">curl .../agents/demo-agent/mcp -d '{"method":"tools/list"}'</text>
    <text fill="#cdd6f4" y="92">"echo"  "get_weather"  "publish_post"  "list_posts"</text>
    <text fill="#fab387" y="112">→ 4 tools visible (admin_reset hidden by ACL)</text>

    <!-- echo -->
    <text fill="#89dceb" font-weight="bold" y="144">▶ Call echo — no restrictions</text>
    <text fill="#6c7086" y="164">$</text>
    <text fill="#cdd6f4" x="16" y="164">curl .../tools/call -d '{"name":"echo","arguments":{"message":"hello"}}'</text>
    <text fill="#a6e3a1" y="184">✓ {"text": "hello"}</text>

    <!-- rate limit -->
    <text fill="#89dceb" font-weight="bold" y="216">▶ Call get_weather ×4 — rate limit triggers on 4th</text>
    <text fill="#6c7086" y="236">$</text>
    <text fill="#cdd6f4" x="16" y="236">curl ... get_weather {"city":"Beijing"}</text>
    <text fill="#a6e3a1" y="256">✓ Call #1: 18°C Partly Cloudy</text>
    <text fill="#a6e3a1" y="276">✓ Call #2: 18°C Partly Cloudy</text>
    <text fill="#a6e3a1" y="296">✓ Call #3: 18°C Partly Cloudy</text>
    <text fill="#f38ba8" y="316">✗ Call #4: Rate limited! (error -32002)</text>

    <!-- approval -->
    <text fill="#89dceb" font-weight="bold" y="348">▶ Call publish_post — requires human approval</text>
    <text fill="#6c7086" y="368">$</text>
    <text fill="#cdd6f4" x="16" y="368">curl ... publish_post {"title":"Hello World"}</text>
    <text fill="#fab387" y="388">⏳ Waiting for approval...</text>
    <text fill="#6c7086" y="408">$</text>
    <text fill="#cdd6f4" x="16" y="408">curl -X POST .../api/v1/approvals/{id}/approve</text>
    <text fill="#a6e3a1" y="428">✓ Approved → published successfully</text>

    <!-- audit -->
    <text fill="#89dceb" font-weight="bold" y="460">▶ Audit trail</text>
    <text fill="#6c7086" y="480">$</text>
    <text fill="#cdd6f4" x="16" y="480">curl '.../api/v1/audit/logs?limit=5' | jq '.[].tool_name'</text>
    <text fill="#cdd6f4" y="500">"publish_post"  "get_weather" ×4  "echo"</text>
    <text fill="#fab387" y="520">→ Every call recorded: agent, tool, verdict, duration</text>
  </g>
</svg>
