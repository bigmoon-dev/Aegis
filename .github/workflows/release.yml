name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cc: gcc
            setup: ""
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            setup: "sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu"
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cc: clang
            setup: ""
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            cc: clang
            setup: ""

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install cross-compiler
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          go build -trimpath -ldflags "-s -w" -o aegis ./cmd/aegis/

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="aegis_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar czf "${ARCHIVE}" aegis LICENSE README.md
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: aegis_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum aegis_*.tar.gz > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            aegis_*.tar.gz
            checksums.txt
