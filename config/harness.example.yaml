server:
  listen: ":18070"
  read_timeout: 300s
  write_timeout: 300s

backends:
  xiaohongshu:
    url: "http://localhost:18060/mcp"
    health_url: "http://localhost:18060/health"
    timeout: 120s

queue:
  xiaohongshu:
    enabled: true
    delay_min: 60s
    delay_max: 600s
    max_pending: 50
    bypass_tools:
      - "check_login_status"
      - "get_login_qrcode"
    global_rate_limits:
      check_login_status:    { window: 2h,  max_count: 6 }
      get_login_qrcode:      { window: 2h,  max_count: 3 }
      search_feeds:          { window: 1h,  max_count: 15 }
      get_feed_detail:       { window: 1h,  max_count: 15 }

agents:
  openclaw-main:
    display_name: "OpenClaw Main Agent"
    backends:
      xiaohongshu:
        allowed: true
        tool_denylist:
          - "delete_cookies"
        rate_limits:
          check_login_status:    { window: 2h,  max_count: 6 }
          get_login_qrcode:      { window: 2h,  max_count: 3 }
          publish_content:       { window: 24h, max_count: 1 }
          publish_with_video:    { window: 24h, max_count: 1 }
          like_feed:             { window: 1h,  max_count: 10 }
          favorite_feed:         { window: 1h,  max_count: 5 }
          post_comment_to_feed:  { window: 1h,  max_count: 3 }
          reply_comment_in_feed: { window: 1h,  max_count: 3 }
          search_feeds:          { window: 1h,  max_count: 10 }
          get_feed_detail:       { window: 1h,  max_count: 10 }
        approval_required:
          - "publish_content"
          - "publish_with_video"

  claude-code:
    display_name: "Claude Code (Dev)"
    backends:
      xiaohongshu:
        allowed: true
        tool_denylist:
          - "publish_content"
          - "publish_with_video"
          - "delete_cookies"
        rate_limits:
          check_login_status:    { window: 2h,  max_count: 6 }
          get_login_qrcode:      { window: 2h,  max_count: 3 }
          search_feeds:          { window: 1h,  max_count: 5 }

  opencode:
    display_name: "OpenCode"
    backends:
      xiaohongshu:
        allowed: false

approval:
  feishu:
    webhook_url: ""  # Set your Feishu webhook URL here
  timeout: 600s
  callback_base_url: "http://192.168.2.146:18070"

audit:
  db_path: "./data/audit.db"
  retention_days: 90
